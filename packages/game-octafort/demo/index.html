<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Octafort – og-octafort Demo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    /* The host page owns the background — the component is a self-contained box,
       so this demo uses a plain flat surface (no full-screen gradient) and
       simply centres the game the way a modal/panel would. */
    /* Flat page surfaces only — no gradients anywhere. The game card sits one
       step lighter/darker than the page so it reads as elevated. */
    :root {
      --page-bg: #f8fafc;
      --page-fg: #64748b;
      --panel-line: #e2e8f0;
    }
    body.theme-dark {
      --page-bg: #0f172a;
      --page-fg: #94a3b8;
      --panel-line: #334155;
    }

    body {
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      gap: 1.1rem;
      background: var(--page-bg);
      color: var(--page-fg);
      font-family: 'Inter', system-ui, sans-serif;
      padding: 1.75rem 1.25rem 3rem;
      transition: background .2s ease, color .2s ease;
    }
    @supports (justify-content: safe center) {
      body { justify-content: safe center; }
    }

    header { text-align: center; }
    header h1 {
      font-size: .95rem;
      font-weight: 700;
      letter-spacing: .12em;
      text-transform: uppercase;
      opacity: .65;
    }

    /* Stand-in for the platform modal the game will really live inside:
       a bordered card that hugs the component with empty margins around it. */
    .modal-shell {
      width: 100%;
      max-width: 560px;
    }

    og-octafort {
      /* Only --og-font is themed by the page here; the component supplies its
         own light/dark palette via the theme attribute below. */
      --og-font: 'Inter', system-ui, sans-serif;
      display: block;
      width: 100%;
      /* No glow here on purpose — the component carries its own soft, natural
         card shadow and border via its theme palette. */
    }

    .controls {
      width: 100%;
      max-width: 560px;
      display: flex;
      flex-wrap: wrap;
      gap: .5rem;
      justify-content: center;
    }
    .controls button {
      cursor: pointer;
      border: 1px solid var(--panel-line);
      background: transparent;
      color: inherit;
      border-radius: 8px;
      padding: .4rem .8rem;
      font-size: .8rem;
      font-weight: 600;
      transition: opacity .15s;
    }
    .controls button:hover { opacity: .7; }

    #mode-hint {
      width: 100%;
      max-width: 560px;
      margin: -0.25rem 0 0;
      font-size: .9rem;
      opacity: .7;
      text-align: center;
      line-height: 1.5;
    }
  </style>
</head>
<body class="theme-dark">
  <header>
    <h1>Octapull Games · Octafort</h1>
  </header>

  <div class="modal-shell">
    <og-octafort id="game" mode="levels" levelCount="8" theme="dark"></og-octafort>
  </div>
  <script>
    // Runs before the module script below, so attributes are correct by the
    // time the custom element upgrades.
    var savedMode = sessionStorage.getItem('octafort-mode');
    if (savedMode) document.getElementById('game').setAttribute('mode', savedMode);
    var savedTheme = sessionStorage.getItem('octafort-theme');
    if (savedTheme) {
      document.getElementById('game').setAttribute('theme', savedTheme);
      document.body.classList.toggle('theme-dark', savedTheme === 'dark');
    }
  </script>

  <p id="mode-hint">
    İpucu: Bir kule, kendi satırındaki/sütunundaki/bölgesindeki ve etrafındaki tüm
    kareleri eler. Kesinlikle kule olamayacak kareleri ✕ (sur) ile işaretleyerek
    ilerle. Dokun: <b>✕ → 🏰 → boş</b>.
  </p>

  <div class="controls">
    <button id="toggle-mode">Modu Değiştir (levels/random)</button>
    <button id="toggle-theme">Tema: Koyu/Açık</button>
    <button id="toggle-mute">Sesi Aç/Kapat</button>
  </div>

  <script type="module">
    import '../src/index.ts';

    const game = document.getElementById('game');

    // Restore state from sessionStorage between reloads (demo only)
    const saved = sessionStorage.getItem('octafort-state');
    if (saved) {
      try { game.state = JSON.parse(saved); } catch (_) {}
    }

    // The hint only makes sense before play begins — hide it once the level starts.
    const modeHint = document.getElementById('mode-hint');
    game.addEventListener('og-level-start', () => { modeHint.style.display = 'none'; }, { once: true });

    game.addEventListener('og-state-change', (e) => {
      sessionStorage.setItem('octafort-state', JSON.stringify(e.detail.state));
    });

    const modeBtn = document.getElementById('toggle-mode');
    const themeBtn = document.getElementById('toggle-theme');
    const muteBtn = document.getElementById('toggle-mute');

    function updateModeButton() {
      modeBtn.textContent = game.mode === 'levels' ? 'Mod: Seviyeler' : 'Mod: Rastgele';
    }
    function updateThemeButton() {
      themeBtn.textContent = game.theme === 'dark' ? 'Tema: Koyu 🌙' : 'Tema: Açık ☀️';
    }
    function updateMuteButton() {
      muteBtn.textContent = game.muted ? 'Ses: Kapalı 🔇' : 'Ses: Açık 🔊';
    }

    updateModeButton();
    updateThemeButton();
    updateMuteButton();

    modeBtn.addEventListener('click', () => {
      sessionStorage.removeItem('octafort-state');
      sessionStorage.setItem('octafort-mode', game.mode === 'levels' ? 'random' : 'levels');
      location.reload();
    });

    themeBtn.addEventListener('click', () => {
      const next = game.theme === 'dark' ? 'light' : 'dark';
      game.theme = next;
      document.body.classList.toggle('theme-dark', next === 'dark');
      sessionStorage.setItem('octafort-theme', next);
      updateThemeButton();
    });

    muteBtn.addEventListener('click', () => {
      game.muted = !game.muted;
      updateMuteButton();
    });
  </script>
</body>
</html>
